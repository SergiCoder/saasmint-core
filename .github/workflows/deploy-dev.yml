name: Deploy to dev VPS

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate ref_name
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ ! "$REF" =~ ^v[A-Za-z0-9._-]+$ ]]; then
            echo "Refusing to deploy: unexpected ref_name '$REF'"
            exit 1
          fi
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          REF: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REF
          script: |
            set -euo pipefail
            cd /opt/saasmint/saasmint-core
            git fetch --tags --force
            git checkout "$REF"
            docker compose --env-file /opt/saasmint/.env.dev -f infra/docker-compose.vps.yml build
            docker compose --env-file /opt/saasmint/.env.dev -f infra/docker-compose.vps.yml up -d
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8001/api/v1/health/ >/dev/null; then
                echo "Deploy successful: $REF"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after 60s"
            docker compose --env-file /opt/saasmint/.env.dev -f infra/docker-compose.vps.yml logs django --tail=100
            exit 1
